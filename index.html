<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Badges</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .custom-badge {
            display: block;          
            width: 100%;            
            padding: 12px;           
            margin-bottom: 10px;     
            font-size: 16px;
            text-align: center;     
            border-radius: 6px;    
        }
    </style>
</head>
<body class="p-4">

    <span class="badge bg-primary custom-badge">Primary</span>
    <span class="badge bg-secondary custom-badge">Secondary</span>
    <span class="badge bg-success custom-badge">Success</span>
    <span class="badge bg-danger custom-badge">Danger</span>
    <span class="badge bg-warning text-dark custom-badge">Warning</span>
    <span class="badge bg-info text-dark custom-badge">Info</span>
    <span class="badge bg-dark custom-badge">Dark</span>

</body>
</html>
